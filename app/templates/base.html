<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0b0d12">
    <title>{% block title %}Homelab Hub{% endblock %}</title>
    <script src="/static/js/htmx.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        base: '#0b0d12',
                        mantle: '#10131a',
                        crust: '#07090d',
                        surface0: '#161a23',
                        surface1: '#1e2330',
                        surface2: '#2a3040',
                        overlay0: '#76819a',
                        overlay1: '#8b96ae',
                        text: '#e8ebf4',
                        subtext0: '#aab3c8',
                        subtext1: '#c3cadb',
                        red: '#ff6b8a',
                        green: '#4ade80',
                        yellow: '#fbbf24',
                        blue: '#60a5fa',
                        mauve: '#a78bfa',
                        teal: '#2dd4bf',
                        peach: '#fb923c',
                        lavender: '#a5b4fc',
                        rose: '#f9a8d4',
                        sky: '#38bdf8',
                        flamingo: '#fda4af',
                    }
                }
            }
        }
        htmx.config.globalViewTransitions = true;
    </script>
    <style>
        /* ── MPA View Transitions ── */
        @view-transition { navigation: auto; }
        ::view-transition-old(root) { animation-duration: 0.15s; }
        ::view-transition-new(root) { animation-duration: 0.18s; }

        :root {
            --spring: linear(0, 0.009, 0.035 2.1%, 0.141 4.4%, 0.723 12.9%, 0.938 16.7%,
                1.017, 1.077, 1.121, 1.149 24.3%, 1.159, 1.163, 1.161, 1.154 29.9%,
                1.129 32.8%, 1.051 39.6%, 1.017 43.1%, 0.991, 0.977 51%, 0.974 53.8%,
                0.975 57.1%, 0.997 69.8%, 1.003 76.9%, 1);
            --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
            --c-red: #ff6b8a;
            --c-yellow: #fbbf24;
            --c-blue: #60a5fa;
            --c-green: #4ade80;
            --c-border: #232838;
            --c-card: #141823;
            --c-card-raised: #181d2a;
            --nav-h: 64px;
        }

        * { box-sizing: border-box; }
        html { scrollbar-color: #2a3040 transparent; }
        body {
            background: #0b0d12;
            color: #e8ebf4;
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
            min-height: 100vh;
            font-feature-settings: 'tnum' 1;
            -webkit-tap-highlight-color: transparent;
        }
        /* Reserve room for the fixed bottom nav on mobile */
        @media (max-width: 639px) {
            main { padding-bottom: calc(var(--nav-h) + env(safe-area-inset-bottom) + 1.5rem) !important; }
        }

        /* ── Cards: flat, high contrast ───────────── */
        .card {
            background: var(--c-card);
            border: 1px solid var(--c-border);
            border-radius: 0.9rem;
            transition: border-color 0.2s, background 0.2s;
            position: relative;
        }
        .card:hover { border-color: #313952; background: var(--c-card-raised); }

        /* Urgency card variants — whole-card tint, unmissable */
        .card-urgent {
            background: linear-gradient(135deg, rgba(255,107,138,0.10), var(--c-card) 55%);
            border-color: rgba(255,107,138,0.4);
        }
        .card-urgent:hover { border-color: rgba(255,107,138,0.6); }
        .card-today {
            background: linear-gradient(135deg, rgba(251,191,36,0.09), var(--c-card) 55%);
            border-color: rgba(251,191,36,0.35);
        }
        .card-today:hover { border-color: rgba(251,191,36,0.55); }

        /* ── Date block (calendar tile on each task card) ── */
        .date-block {
            width: 3.1rem;
            min-width: 3.1rem;
            border-radius: 0.6rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0.35rem 0;
            background: var(--c-surface, #1e2330);
            border: 1px solid var(--c-border);
            line-height: 1.1;
        }
        .date-block .db-mon {
            font-size: 0.58rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: #76819a;
        }
        .date-block .db-day {
            font-size: 1.25rem;
            font-weight: 800;
            font-variant-numeric: tabular-nums;
            color: #e8ebf4;
        }
        .date-block.db-red { background: rgba(255,107,138,0.14); border-color: rgba(255,107,138,0.45); }
        .date-block.db-red .db-mon, .date-block.db-red .db-day { color: var(--c-red); }
        .date-block.db-yellow { background: rgba(251,191,36,0.13); border-color: rgba(251,191,36,0.4); }
        .date-block.db-yellow .db-mon, .date-block.db-yellow .db-day { color: var(--c-yellow); }
        .date-block.db-blue { background: rgba(96,165,250,0.12); border-color: rgba(96,165,250,0.35); }
        .date-block.db-blue .db-mon, .date-block.db-blue .db-day { color: var(--c-blue); }

        /* ── Section bands ─────────────────────────── */
        .section-hero {
            background: linear-gradient(180deg, rgba(255,107,138,0.06), transparent);
            border: 1px solid rgba(255,107,138,0.18);
            border-radius: 1.1rem;
            padding: 1rem;
        }
        .section-title {
            font-size: 0.8rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #8b96ae;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .count-badge {
            font-size: 0.7rem;
            font-weight: 800;
            padding: 0.1rem 0.55rem;
            border-radius: 9999px;
            background: #1e2330;
            border: 1px solid var(--c-border);
            color: #aab3c8;
            font-variant-numeric: tabular-nums;
        }

        /* Collapsible sections */
        details.collapse-section > summary {
            list-style: none;
            cursor: pointer;
            user-select: none;
        }
        details.collapse-section > summary::-webkit-details-marker { display: none; }
        details.collapse-section > summary .chev {
            transition: transform 0.25s var(--ease-out);
            display: inline-block;
        }
        details.collapse-section[open] > summary .chev { transform: rotate(90deg); }

        /* ── Staggered entrance ────────────────────── */
        @media (prefers-reduced-motion: no-preference) {
            .animate-in {
                animation: rise-in 0.4s var(--ease-out) backwards;
                animation-delay: calc(var(--i, 0) * 35ms);
            }
            @keyframes rise-in {
                from { opacity: 0; transform: translateY(10px); }
                to   { opacity: 1; transform: translateY(0); }
            }
            .animate-pop {
                animation: pop-in 0.45s var(--spring) backwards;
                animation-delay: calc(var(--i, 0) * 50ms);
            }
            @keyframes pop-in {
                from { opacity: 0; transform: scale(0.92); }
                to   { opacity: 1; transform: scale(1); }
            }
        }

        /* ── Buttons ───────────────────────────────── */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.35rem;
            padding: 0.55rem 1rem;
            border-radius: 0.65rem;
            font-weight: 700;
            font-size: 0.875rem;
            transition: transform 0.25s var(--spring), background 0.2s, border-color 0.2s, color 0.2s;
            cursor: pointer;
            border: none;
            letter-spacing: 0.01em;
            min-height: 2.5rem;
        }
        .btn:active { transform: scale(0.95); transition-duration: 0.08s; }
        .btn-primary { background: #60a5fa; color: #07090d; }
        .btn-primary:hover { background: #7eb6fb; }
        .btn-success { background: #4ade80; color: #07090d; }
        .btn-success:hover { background: #6ce698; }
        .btn-danger { background: rgba(255,107,138,0.15); color: var(--c-red); border: 1px solid rgba(255,107,138,0.35); }
        .btn-danger:hover { background: rgba(255,107,138,0.25); }
        .btn-ghost {
            background: #1a1f2c;
            color: #aab3c8;
            border: 1px solid var(--c-border);
        }
        .btn-ghost:hover { background: #222838; color: #e8ebf4; }
        .btn-sm { padding: 0.4rem 0.75rem; font-size: 0.8rem; min-height: 2.1rem; }
        .btn-xs { padding: 0.3rem 0.65rem; font-size: 0.72rem; min-height: 1.9rem; border-radius: 0.5rem; }

        /* ── Inputs ────────────────────────────────── */
        .input {
            background: #10131a;
            border: 1px solid var(--c-border);
            border-radius: 0.65rem;
            padding: 0.65rem 0.85rem;
            color: #e8ebf4;
            width: 100%;
            transition: border-color 0.2s, box-shadow 0.2s;
            font-size: 0.95rem;
            min-height: 2.75rem;
        }
        .input:focus {
            border-color: #60a5fa;
            outline: none;
            box-shadow: 0 0 0 3px rgba(96,165,250,0.18);
        }
        select.input { cursor: pointer; }

        /* ── Filter chips ──────────────────────────── */
        .chip {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.42rem 0.9rem;
            border-radius: 9999px;
            font-size: 0.8rem;
            font-weight: 700;
            color: #aab3c8;
            background: #161a23;
            border: 1px solid var(--c-border);
            transition: all 0.2s;
            text-decoration: none;
            white-space: nowrap;
            min-height: 2.1rem;
        }
        .chip:hover { color: #e8ebf4; border-color: #3a425c; }
        .chip-active {
            color: #07090d;
            background: #60a5fa;
            border-color: #60a5fa;
        }
        .chip-active:hover { color: #07090d; background: #60a5fa; }

        /* ── Stat tiles (tappable filters) ─────────── */
        .stat-tile {
            background: var(--c-card);
            border: 1px solid var(--c-border);
            border-radius: 0.9rem;
            padding: 0.8rem 1rem;
            position: relative;
            display: block;
            text-decoration: none;
            transition: transform 0.25s var(--spring), border-color 0.2s, background 0.2s;
        }
        .stat-tile:hover { border-color: color-mix(in srgb, var(--c, #60a5fa) 50%, transparent); background: var(--c-card-raised); }
        .stat-tile:active { transform: scale(0.96); }
        .stat-tile.stat-hot { border-color: color-mix(in srgb, var(--c, #60a5fa) 45%, transparent); background: linear-gradient(135deg, color-mix(in srgb, var(--c, #60a5fa) 10%, transparent), var(--c-card) 60%); }
        .stat-num {
            font-size: 1.7rem;
            font-weight: 800;
            line-height: 1.1;
            font-variant-numeric: tabular-nums;
        }
        .stat-label {
            font-size: 0.66rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #76819a;
        }

        /* ── Pulse for overdue ─────────────────────── */
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255,107,138,0.25); }
            50% { box-shadow: 0 0 0 5px rgba(255,107,138,0); }
        }
        .pulse-overdue { animation: pulse-glow 2.4s infinite; }

        /* ── Header (desktop) / Bottom nav (mobile) ── */
        .header-bar {
            background: rgba(11,13,18,0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--c-border);
        }
        .nav-link {
            padding: 0.4rem 0.8rem;
            border-radius: 0.55rem;
            font-size: 0.875rem;
            font-weight: 600;
            color: #aab3c8;
            transition: all 0.2s;
        }
        .nav-link:hover { color: #e8ebf4; background: #1a1f2c; }
        .nav-link.active { color: #60a5fa; background: rgba(96,165,250,0.12); }

        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            z-index: 50;
            background: rgba(13,16,23,0.92);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-top: 1px solid var(--c-border);
            display: flex;
            align-items: stretch;
            justify-content: space-around;
            height: calc(var(--nav-h) + env(safe-area-inset-bottom));
            padding-bottom: env(safe-area-inset-bottom);
        }
        .bnav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            text-decoration: none;
            color: #76819a;
            font-size: 0.62rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            transition: color 0.2s;
        }
        .bnav-item .bnav-ico { font-size: 1.35rem; line-height: 1; }
        .bnav-item.active { color: #60a5fa; }
        /* ── Floating add button (bottom-right, mobile only) ── */
        .fab-add {
            position: fixed;
            right: 1rem;
            bottom: calc(var(--nav-h) + env(safe-area-inset-bottom) + 1rem);
            z-index: 60;
            width: 56px; height: 56px;
            border-radius: 50%;
            background: #60a5fa;
            color: #07090d;
            border: none;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(96,165,250,0.45), 0 2px 6px rgba(0,0,0,0.35);
            transition: transform 0.25s var(--spring), box-shadow 0.2s;
        }
        .fab-add:active { transform: scale(0.92); }
        /* Plus drawn with CSS bars so it's pixel-centered everywhere
           (iOS renders the "+" text glyph off-center). */
        .fab-add::before,
        .fab-add::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            background: currentColor;
            border-radius: 2px;
        }
        .fab-add::before { width: 20px; height: 3px; transform: translate(-50%, -50%); }
        .fab-add::after  { width: 3px;  height: 20px; transform: translate(-50%, -50%); }
        /* Desktop has its own in-page add buttons; hide the mobile FAB there */
        @media (min-width: 640px) { .fab-add { display: none; } }

        /* ── Badges ────────────────────────────────── */
        .glass-badge {
            background: #1a1f2c;
            border: 1px solid var(--c-border);
            border-radius: 9999px;
            padding: 0.18rem 0.6rem;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.02em;
        }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }

        /* ── Swipe enhancement ─────────────────────── */
        .swipe-wrap { position: relative; overflow: hidden; border-radius: 0.9rem; }
        .swipe-under {
            position: absolute; inset: 0;
            display: flex; align-items: center;
            padding: 0 1.25rem;
            font-weight: 800; font-size: 0.85rem;
            border-radius: 0.9rem;
            opacity: 0;
            transition: opacity 0.15s;
        }
        .swipe-under.su-done { background: rgba(74,222,128,0.18); color: var(--c-green); justify-content: flex-start; }
        .swipe-card { position: relative; touch-action: pan-y; will-change: transform; }
        .swipe-card.swiping { transition: none; }
        .swipe-card.snap-back { transition: transform 0.3s var(--spring); }

        /* ── Calendar ──────────────────────────────── */
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .cal-dow {
            text-align: center; font-size: 0.62rem; font-weight: 800;
            text-transform: uppercase; letter-spacing: 0.08em; color: #76819a;
            padding-bottom: 0.4rem;
        }
        .cal-cell {
            aspect-ratio: 1 / 1.05;
            border-radius: 0.55rem;
            background: #11141d;
            border: 1px solid #1c2130;
            padding: 4px 5px;
            display: flex; flex-direction: column;
            gap: 2px;
            font-size: 0.72rem;
            color: #8b96ae;
            text-decoration: none;
            position: relative;
            transition: border-color 0.2s, background 0.2s;
            overflow: hidden;
        }
        .cal-cell.has-tasks { background: var(--c-card-raised); border-color: #2a3147; cursor: pointer; }
        .cal-cell.has-tasks:hover { border-color: #60a5fa; }
        .cal-cell.cal-other { opacity: 0.3; }
        .cal-cell.cal-today { border-color: #60a5fa; box-shadow: 0 0 0 1px #60a5fa inset; }
        .cal-cell .cal-num { font-weight: 700; font-variant-numeric: tabular-nums; }
        .cal-cell.cal-today .cal-num { color: #60a5fa; }
        .cal-dots { display: flex; flex-wrap: wrap; gap: 2px; margin-top: auto; }
        .cal-dot { width: 6px; height: 6px; border-radius: 50%; }
        .cal-count {
            font-size: 0.58rem; font-weight: 800;
            color: #aab3c8;
        }

        /* ── Native Popover (snooze menu) ──────────── */
        .pop-menu {
            background: #181d2a;
            border: 1px solid #2a3147;
            border-radius: 0.8rem;
            padding: 0.4rem;
            box-shadow: 0 16px 48px rgba(0,0,0,0.6);
            color: #e8ebf4;
        }
        .pop-menu:popover-open { animation: pop-in 0.25s var(--spring); }
        @supports (position-area: top) {
            .pop-menu {
                margin: 0;
                position-area: top span-left;
                position-try-fallbacks: flip-block, flip-inline;
                margin-bottom: 0.4rem;
            }
        }
        .pop-item {
            display: block;
            width: 100%;
            text-align: left;
            padding: 0.55rem 0.85rem;
            border-radius: 0.55rem;
            font-size: 0.85rem;
            font-weight: 600;
            color: #c3cadb;
            background: transparent;
            border: none;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
        }
        .pop-item:hover { background: rgba(96,165,250,0.14); color: #e8ebf4; }

        /* ── Toasts ────────────────────────────────── */
        #toast-container {
            position: fixed;
            bottom: calc(var(--nav-h) + env(safe-area-inset-bottom) + 0.75rem);
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            align-items: center;
            pointer-events: none;
        }
        @media (min-width: 640px) { #toast-container { bottom: 1.25rem; } }
        .toast {
            background: #1e2330;
            border: 1px solid #2f3750;
            border-radius: 9999px;
            padding: 0.6rem 1.25rem;
            font-size: 0.85rem;
            font-weight: 700;
            color: #e8ebf4;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            animation: toast-in 0.4s var(--spring);
        }
        .toast.toast-out { animation: toast-out 0.3s ease forwards; }
        @keyframes toast-in {
            from { opacity: 0; transform: translateY(16px) scale(0.92); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes toast-out {
            to { opacity: 0; transform: translateY(10px) scale(0.95); }
        }

        .htmx-indicator { opacity: 0; transition: opacity 0.2s; }
        .htmx-request .htmx-indicator { opacity: 1; }

        @media (prefers-reduced-motion: reduce) {
            .pulse-overdue { animation: none; }
            *, *::before, *::after { transition-duration: 0.01ms !important; }
        }

        /* ── Hub additions ─────────────────────────── */
        .hub-logo svg { width: 22px; height: 22px; display: block; }
        .tab-nav .nav-link { position: relative; }
        .tab-nav .nav-link.active::after {
            content: ''; position: absolute; left: 0.8rem; right: 0.8rem; bottom: -2px;
            height: 2px; border-radius: 2px; background: #60a5fa;
            animation: tab-grow 0.3s var(--spring);
        }
        @keyframes tab-grow { from { transform: scaleX(0.3); opacity: 0; } to { transform: scaleX(1); opacity: 1; } }

        /* Gear / settings panel per tab */
        .gear-btn {
            width: 2.4rem; height: 2.4rem; border-radius: 0.65rem;
            display: inline-flex; align-items: center; justify-content: center;
            background: #1a1f2c; border: 1px solid var(--c-border); color: #aab3c8;
            cursor: pointer; font-size: 1.05rem;
            transition: transform 0.4s var(--spring), background 0.2s, color 0.2s;
        }
        .gear-btn:hover { color: #e8ebf4; background: #222838; transform: rotate(45deg); }
        details.settings-panel > summary { list-style: none; cursor: pointer; }
        details.settings-panel > summary::-webkit-details-marker { display: none; }
        details.settings-panel[open] .gear-btn { color: #60a5fa; transform: rotate(90deg); }
        details.settings-panel > .settings-body { animation: rise-in 0.3s var(--ease-out); }

        /* Modal (flat) */
        .modal-overlay {
            position: fixed; inset: 0; z-index: 80;
            background: rgba(5,7,10,0.7); backdrop-filter: blur(4px);
            display: flex; align-items: flex-end; justify-content: center;
        }
        @media (min-width: 640px) { .modal-overlay { align-items: center; } }
        .modal-panel {
            background: #141823; border: 1px solid #232838;
            border-radius: 1.1rem 1.1rem 0 0; width: 100%; max-width: 480px;
            max-height: 88vh; overflow-y: auto; padding: 1.25rem;
            animation: modal-up 0.35s var(--spring);
        }
        @media (min-width: 640px) { .modal-panel { border-radius: 1.1rem; } }
        @keyframes modal-up { from { opacity: 0; transform: translateY(30px) scale(0.97); } to { opacity: 1; transform: none; } }
        .field-label { display:block; font-size: 0.72rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.07em; color: #76819a; margin-bottom: 0.3rem; }

        /* Image lightbox */
        .lightbox {
            position: fixed; inset: 0; z-index: 90; background: rgba(4,5,8,0.92);
            display: flex; align-items: center; justify-content: center; padding: 1rem;
            animation: fade-in 0.2s ease; cursor: zoom-out;
        }
        .lightbox img { max-width: 100%; max-height: 92vh; border-radius: 0.7rem; animation: modal-up 0.3s var(--spring); }
        @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }

        /* Photo thumbnails */
        .thumb {
            width: 96px; height: 96px; object-fit: cover; border-radius: 0.7rem;
            border: 1px solid var(--c-border); cursor: zoom-in;
            transition: transform 0.3s var(--spring), border-color 0.2s;
        }
        .thumb:hover { transform: scale(1.04); border-color: #60a5fa; }

        /* Notes rendering */
        .note-check { display: flex; align-items: flex-start; gap: 0.6rem; padding: 0.28rem 0; cursor: pointer; }
        .note-check input { width: 1.15rem; height: 1.15rem; margin-top: 0.12rem; accent-color: #4ade80; cursor: pointer; flex-shrink: 0; }
        .note-check.done span { color: #76819a; text-decoration: line-through; }
        .note-check span { transition: color 0.2s; }
        .note-h1 { font-size: 1.25rem; font-weight: 800; margin: 0.6rem 0 0.2rem; }
        .note-h2 { font-size: 1.1rem; font-weight: 800; margin: 0.5rem 0 0.15rem; }
        .note-h3 { font-size: 0.95rem; font-weight: 800; margin: 0.4rem 0 0.1rem; color: #c3cadb; }
        .note-li { padding: 0.15rem 0 0.15rem 0.25rem; }
        .note-p { padding: 0.15rem 0; }
        .note-blank { height: 0.55rem; }
        .note-p code, .note-li code { background: #1e2330; border: 1px solid var(--c-border); border-radius: 0.3rem; padding: 0.05rem 0.35rem; font-size: 0.85em; }
        .note-p a, .note-li a { color: #60a5fa; text-decoration: underline; text-underline-offset: 2px; word-break: break-all; }

        /* Progress ring/bar for note checkboxes */
        .progress-bar { height: 5px; border-radius: 999px; background: #1e2330; overflow: hidden; }
        .progress-bar > div { height: 100%; border-radius: 999px; background: linear-gradient(90deg, #4ade80, #2dd4bf); transition: width 0.5s var(--ease-out); }

        /* Pet avatar */
        .pet-avatar { border-radius: 50%; object-fit: cover; border: 2px solid rgba(251,146,60,0.55); background: #1e2330; }
        .vax-overdue { background: linear-gradient(135deg, rgba(255,107,138,0.10), var(--c-card) 55%); border-color: rgba(255,107,138,0.4); }
        .vax-soon { background: linear-gradient(135deg, rgba(251,191,36,0.09), var(--c-card) 55%); border-color: rgba(251,191,36,0.35); }
        .vax-coming { background: linear-gradient(135deg, rgba(96,165,250,0.08), var(--c-card) 55%); border-color: rgba(96,165,250,0.3); }

        /* Calendar dot colors for vax */
        .cal-dot.dot-vax { background: #fb923c; }

        /* Switch toggle */
        .switch { position: relative; display: inline-block; width: 44px; height: 24px; flex-shrink: 0; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .switch .slider { position: absolute; inset: 0; border-radius: 999px; background: #2a3040; transition: background 0.25s; cursor: pointer; }
        .switch .slider::before { content: ''; position: absolute; width: 18px; height: 18px; border-radius: 50%; background: #aab3c8; top: 3px; left: 3px; transition: transform 0.25s var(--spring), background 0.25s; }
        .switch input:checked + .slider { background: #4ade80; }
        .switch input:checked + .slider::before { transform: translateX(20px); background: #07090d; }
    </style>
    <script>
        // ── Flash toasts ──
        function showToast(msg) {
            const c = document.getElementById('toast-container');
            if (!c) return;
            const t = document.createElement('div');
            t.className = 'toast';
            t.textContent = msg;
            c.appendChild(t);
            setTimeout(() => { t.classList.add('toast-out'); setTimeout(() => t.remove(), 320); }, 2600);
        }
        function checkFlash() {
            const m = sessionStorage.getItem('flash');
            if (m) { sessionStorage.removeItem('flash'); showToast(m); }
        }
        document.addEventListener('submit', (e) => {
            const msg = e.target.dataset && e.target.dataset.flash;
            if (msg) sessionStorage.setItem('flash', msg);
        }, true);
        window.addEventListener('pageshow', checkFlash);
        document.addEventListener('htmx:afterSwap', () => { checkFlash(); animateCounters(); });

        // ── Count-up for stat numbers ──
        function animateCounters() {
            if (matchMedia('(prefers-reduced-motion: reduce)').matches) return;
            document.querySelectorAll('[data-count]:not([data-counted])').forEach(el => {
                el.setAttribute('data-counted', '1');
                const target = parseInt(el.dataset.count, 10) || 0;
                if (target === 0) { el.textContent = '0'; return; }
                const dur = 500, t0 = performance.now();
                function tick(t) {
                    const p = Math.min((t - t0) / dur, 1);
                    const eased = 1 - Math.pow(1 - p, 3);
                    el.textContent = Math.round(target * eased);
                    if (p < 1) requestAnimationFrame(tick);
                }
                requestAnimationFrame(tick);
            });
        }
        document.addEventListener('DOMContentLoaded', animateCounters);

        // ── Swipe-right-to-complete (touch enhancement; buttons remain) ──
        (function () {
            let startX = 0, startY = 0, dx = 0, active = null, locked = false;
            const THRESHOLD = 110;

            document.addEventListener('touchstart', (e) => {
                const card = e.target.closest('.swipe-card');
                if (!card || e.target.closest('button, a, input, select, [popover]')) return;
                active = card;
                startX = e.touches[0].clientX;
                startY = e.touches[0].clientY;
                dx = 0; locked = false;
                card.classList.remove('snap-back');
            }, { passive: true });

            document.addEventListener('touchmove', (e) => {
                if (!active) return;
                const mx = e.touches[0].clientX - startX;
                const my = e.touches[0].clientY - startY;
                if (!locked) {
                    if (Math.abs(my) > Math.abs(mx)) { active = null; return; } // vertical scroll wins
                    if (Math.abs(mx) > 12) locked = true;
                    else return;
                }
                dx = Math.max(0, mx); // right-swipe only
                active.classList.add('swiping');
                active.style.transform = `translateX(${dx}px)`;
                const under = active.parentElement.querySelector('.swipe-under');
                if (under) under.style.opacity = Math.min(dx / THRESHOLD, 1);
            }, { passive: true });

            document.addEventListener('touchend', () => {
                if (!active) return;
                const card = active;
                active = null;
                card.classList.remove('swiping');
                if (dx >= THRESHOLD) {
                    card.style.transform = 'translateX(110%)';
                    card.style.transition = 'transform 0.25s ease';
                    const form = card.querySelector('form[data-swipe-complete]');
                    if (form) setTimeout(() => form.requestSubmit(), 180);
                } else {
                    card.classList.add('snap-back');
                    card.style.transform = '';
                    const under = card.parentElement.querySelector('.swipe-under');
                    if (under) under.style.opacity = 0;
                }
                dx = 0;
            }, { passive: true });
        })();
    </script>
</head>
