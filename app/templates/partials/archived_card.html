<div class="card p-4 opacity-70 hover:opacity-100 transition-all duration-300 animate-in">
    <a href="/tasks/{{ task.id }}" class="flex items-start justify-between gap-3 mb-3 hover:no-underline">
        <div class="min-w-0 flex-1">
            <h3 class="font-semibold text-subtext0 text-sm hover:text-text transition-colors truncate">{{ task.title }}</h3>
            <div class="flex items-center gap-2 mt-1">
                {% if task.category %}
                <span class="glass-badge" style="color: {{ task.category.color }}; border-color: {{ task.category.color }}30;">
                    {{ task.category.icon }} {{ task.category.name }}
                </span>
                {% endif %}
            </div>
        </div>
        <span class="text-xs font-mono text-overlay0 flex-shrink-0">{{ task.due_date | datefmt }}</span>
    </a>

    <div class="flex items-center gap-2 pt-2 border-t border-white/5">
        <form action="/api/tasks/{{ task.id }}/restore" method="POST" class="flex items-center gap-2 flex-1"
              data-flash="🔄 {{ task.title }} restored"
              hx-post="/api/tasks/{{ task.id }}/restore"
              hx-target="body" hx-swap="outerHTML transition:true">
            <input type="date" name="due_date" value="{{ today_str }}" class="input text-xs py-1.5 flex-1" required>
            <button type="submit" class="btn btn-success btn-xs flex-shrink-0">🔄 Restore</button>
        </form>
        <form action="/api/tasks/{{ task.id }}" method="POST"
              data-flash="🗑️ {{ task.title }} deleted"
              hx-post="/api/tasks/{{ task.id }}"
              hx-target="body" hx-swap="outerHTML transition:true"
              onsubmit="return confirm('Permanently delete this archived task?')"
              class="flex-shrink-0">
            <input type="hidden" name="_method" value="DELETE">
            <button type="submit" class="btn btn-danger btn-xs" title="Delete permanently">🗑️</button>
        </form>
    </div>
</div>
